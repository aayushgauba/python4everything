{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Python 4 Almost Everything{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}?v=4">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container">
        <a class="brand" href="{% url 'home' %}">
          <span class="brand-mark">P4E</span>
          <span class="brand-text">Python 4 Almost Everything</span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="{% url 'home' %}">Home</a>
          <a href="{% url 'about' %}">About</a>
          <a href="{% url 'news' %}">News</a>
          <a href="{% url 'venue' %}">Venue</a>
          <a href="{% url 'speaking' %}">Speaking</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Python 4 Almost Everything · St. Louis · June 18 · 4:00 PM to 7:00 PM</p>
      </div>
    </footer>
  </div>
</body>
</html>
